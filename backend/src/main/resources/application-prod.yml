spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/football
    driver-class-name: org.postgresql.Driver
    username: postgres
    password: ${DB_PASSWORD:postgres}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false

logging:
  level:
    com.football: INFO

# 生产环境开启实时赔率同步
football:
  datasource:
    sync-enabled: true
